<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="SIGAP PSU – Dinas Perumahan Rakyat & Kawasan Permukiman Kab. Ngawi"/>
  <title>WebGIS PSU Jalan – Dinas Perumahan Rakyat & Kawasan Permukiman Kab. Ngawi</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <!-- App Style -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar" role="banner">
  <div class="topbar-left">
    <img src="logo.png" class="logo" alt="Logo Kabupaten Ngawi"/>
    <div class="topbar-title">
      <span class="title-main">SIGAP PSU</span>
      <span class="title-sub">Dinas Perumahan Rakyat &amp; Kawasan Permukiman – Kabupaten Ngawi</span>
    </div>
  </div>
  <div class="topbar-right" role="region" aria-label="Statistik">
    <div class="stat-chip" title="Jumlah segmen jalan">
      <span class="stat-icon" aria-hidden="true">🛣️</span>
      <div class="stat-info">
        <span class="stat-label">Segmen Jalan</span>
        <span class="stat-val" id="total-jalan">–</span>
      </div>
    </div>
    <div class="stat-chip" title="Total panjang jalan">
      <span class="stat-icon" aria-hidden="true">📏</span>
      <div class="stat-info">
        <span class="stat-label">Total Panjang</span>
        <span class="stat-val" id="total-panjang">–</span>
      </div>
    </div>
    <div class="stat-chip" title="Jumlah fasilitas umum">
      <span class="stat-icon" aria-hidden="true">🏫</span>
      <div class="stat-info">
        <span class="stat-label">Fasilitas Umum</span>
        <span class="stat-val" id="total-fasum">–</span>
      </div>
    </div>
  </div>
</header>

<!-- PETA UTAMA -->
<div id="map" role="main" aria-label="Peta WebGIS PSU Jalan Ngawi"></div>

<!-- INFO PANEL (detail atribut) -->
<div id="info-panel" class="hidden" role="complementary" aria-label="Detail fitur">
  <div class="info-header">
    <span id="info-title">Detail</span>
    <button class="btn-close" onclick="closePanel()" title="Tutup panel" aria-label="Tutup panel detail">✕</button>
  </div>
  <div id="info-content"></div>
</div>

<!-- BASEMAP SWITCHER -->
<div id="basemap-switcher" role="group" aria-label="Pilih basemap">
  <button class="bm-btn active" data-bm="satellite" title="Basemap Satelit" aria-label="Satelit">🛰️</button>
  <button class="bm-btn"        data-bm="osm"       title="OpenStreetMap"   aria-label="Peta Jalan">🗺️</button>
  <button class="bm-btn"        data-bm="topo"      title="Topografi"       aria-label="Topografi">⛰️</button>
</div>

<!-- LAYER PANEL -->
<div id="layer-panel" role="group" aria-label="Kontrol layer">
  <div class="lp-header">Layer</div>
  <label class="lp-item">
    <input type="checkbox" id="tog-jalan" checked aria-label="Tampilkan layer jalan"/>
    <span class="lp-swatch jalan-sw" aria-hidden="true"></span>
    Jalan PSU
  </label>
  <label class="lp-item">
    <input type="checkbox" id="tog-kelurahan" checked aria-label="Tampilkan batas kelurahan"/>
    <span class="lp-swatch kel-sw" aria-hidden="true"></span>
    Batas Kelurahan
  </label>
  <label class="lp-item">
    <input type="checkbox" id="tog-fasum" checked aria-label="Tampilkan fasilitas umum"/>
    <span class="lp-swatch fasum-sw" aria-hidden="true"></span>
    Fasilitas Umum
  </label>
</div>

<!-- TOAST NOTIFICATION (error/info) -->
<div id="toast-notif" class="toast-notif" role="alert" aria-live="polite"></div>

<!-- LOADING OVERLAY -->
<div id="loading-overlay" role="status" aria-label="Memuat data peta">
  <div class="loading-box">
    <div class="spinner" aria-hidden="true"></div>
    <p>Memuat data peta…</p>
  </div>
</div>

<!-- Scripts (akhir body) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>
</body>
</html>
